<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – Town of EGovt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-body">
    <section class="auth-section">
      <div class="auth-card">
        <img src="assets/images/logoStackly.webp" alt="Stackly Logo" class="auth-logo" />
        <h2>Create Account</h2>
        <form class="auth-form" id="registerForm">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" placeholder="Choose a username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" required>
              <option value="" selected disabled>Select your role</option>
              <option value="citizen">Citizen</option>
              <option value="staff">Municipal Staff</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Mail ID</label>
            <input type="email" class="form-control" placeholder="Enter your email" required />
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Password" required />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" placeholder="Confirm" required />
            </div>
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms" required />
                <label class="form-check-label small" for="terms">
                I agree to the <a href="#" class="text-decoration-none" style="color: #c8102e;">Terms & Conditions</a>
              </label>
            </div>
          </div>
          <button type="submit" class="auth-btn">Register Account</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="login.html">Login Here</a>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/components.js"></script>
    <script src="script.js"></script>
    <script>
      // Redirect to login page on successful "registration"
      document.getElementById('registerForm').addEventListener('submit', function(e) {
          e.preventDefault();
          // You can add validation logic here
          alert('Registration successful! Redirecting to login page...');
          window.location.href = 'login.html';
      });
    </script>
  </body>
</html>
