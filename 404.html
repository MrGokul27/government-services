<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found – Town of EGovt</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/css/404.css" />
  </head>
  <body>
    <!-- FULL SCREEN 404 CONTENT WITH ANIMATIONS -->
    <main class="error-page-wrapper">
      <!-- Background decorative elements -->
      <div class="error-bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>

      <div class="container">
        <div class="error-inner-content text-center">
          <div class="error-visual">
            <h2 class="error-code">404</h2>
            <div class="error-circle"></div>
            <div class="error-glow"></div>
          </div>
          <h1 class="error-title">Lost in the City?</h1>
          <p class="error-message">
            The page you're looking for has taken a detour. It might have been
            moved or no longer exists in our municipal records. Let's get you
            back on track.
          </p>
          <div class="error-actions">
            <a href="index.html" class="btn-error-home">
              <i class="bi bi-house-door me-2"></i>Return Home
            </a>
            <a href="contact.html" class="btn-error-contact">Report Issue</a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/components.js"></script>
    <script src="script.js"></script>
  </body>
</html>
