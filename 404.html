      </div>

      <!-- Icon + title -->
      <div class="e4-icon-wrap">
        <div class="e4-icon-ring"></div>
        <i class="bi bi-map e4-icon"></i>
      </div>

      <h1 class="e4-title">Page Not Found</h1>
      <p class="e4-sub">

        It may have been moved, removed, or never existed in our records.
      </p>

      <!-- CTA buttons -->

          ><i class="bi bi-house-door"></i> Return Home</a
        >
        <a href="javascript:history.back()" class="e4-btn-ghost"
          ><i class="bi bi-arrow-left"></i> Go Back</a
        >
      </div>
    </main>

    <script>
      // Glitch effect on 404 text — random flicker
      (function () {
        const el = document.querySelector(".e4-code");
        if (!el) return;
        function glitch() {
          el.classList.add("glitching");
          setTimeout(() => el.classList.remove("glitching"), 300);
          setTimeout(glitch, 2500 + Math.random() * 3000);
        }
        setTimeout(glitch, 1200);
      })();
    </script>
