<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings – Town of EGovt</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="dash-wrapper">
      <aside class="dash-sidebar">
        <div class="dash-sidebar-header">
          <img src="assets/images/logoStackly.webp" width="140" alt="Logo" />
        </div>
        <ul class="dash-nav" id="dashSidebarNav">
          <li data-roles="citizen,staff,admin">
            <a href="dashboard.html"
              ><i class="bi bi-speedometer2"></i> Dashboard</a
            >
          </li>
          <li data-roles="citizen">
            <a href="dash-applications.html"
              ><i class="bi bi-file-earmark-text"></i> My Applications</a
            >
          </li>
          <li data-roles="citizen">
            <a href="dash-payments.html"
              ><i class="bi bi-wallet2"></i> Payments & Taxes</a
            >
          </li>
          <li data-roles="citizen,staff">
            <a href="dash-issues.html"
              ><i class="bi bi-megaphone"></i> Reported Issues</a
            >
          </li>
          <li data-roles="staff,admin">
            <a href="dash-users.html"
              ><i class="bi bi-people"></i> Manage Users</a
            >
          </li>
          <li data-roles="admin">
            <a href="dash-settings.html"
              ><i class="bi bi-gear"></i> System Settings</a
            >
          </li>
          <li data-roles="citizen,staff,admin">
            <a href="dash-profile.html"
              ><i class="bi bi-person"></i> Profile Settings</a
            >
          </li>
          <li data-roles="citizen,staff,admin" class="logout-item">
            <a href="index.html" class="logout-link"
              ><i class="bi bi-box-arrow-left"></i> Logout</a
            >
          </li>
        </ul>
      </aside>
      <main class="dash-main">
        <button
          class="dash-sidebar-toggle"
          id="dashSidebarToggle"
          aria-label="Toggle sidebar"
        >
          <i class="bi bi-list"></i>
        </button>
        <div class="dash-topbar">
          <div class="dash-welcome">
            <h1 id="welcomeMessage">Profile Settings</h1>
            <p class="text-secondary small">
              Update your personal account information
            </p>
          </div>
          <div class="dash-user-pill">
            <i class="bi bi-bell text-crimson"></i>
            <div class="vr"></div>
            <span class="fw-bold small" id="userPillName">User</span>
            <img src="" width="32" class="rounded-circle" id="userPillAvatar" />
          </div>
        </div>
        <div class="dash-card">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">First Name</label>
              <input type="text" class="form-control" value="John" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Last Name</label>
              <input type="text" class="form-control" value="Citizen" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email Address</label>
              <input
                type="email"
                class="form-control"
                id="profileEmail"
                readonly
              />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Phone Number</label>
              <input
                type="tel"
                class="form-control"
                value="+1 (555) 123-4567"
              />
            </div>
            <div class="col-12 mt-4 text-end">
              <button type="submit" class="auth-btn w-auto px-5 m-0">
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <div class="dash-overlay" id="dashOverlay"></div>
    <script src="dashboard.js"></script>
    <script>
      document.getElementById("profileEmail").value =
        sessionStorage.getItem("loggedInUserEmail") || "user@example.com";
    </script>
  </body>
</html>
