<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us – Town of EGovt</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/css/contact.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <!-- PAGE HERO -->
    <section class="page-hero contact-hero">
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <h1>Contact Us</h1>
        <nav aria-label="breadcrumb">
          <ol class="page-breadcrumb">
            <li><a href="index.html">Home</a></li>
            <li class="separator"></li>
            <li>Contact Us</li>
          </ol>
        </nav>
      </div>
    </section>

    <!-- CONTACT MAIN CONTENT -->
    <section class="contact-main">
      <div class="container">
        <div class="row">
          <!-- Contact Info -->
          <div class="col-lg-5 mb-5 mb-lg-0">
            <div class="contact-info-wrap">
              <div class="contact-heading">
                <h3>Get In Touch</h3>
                <p>
                  We really appreciate you taking the time to get in touch.
                  Please fill in the form below.
                </p>
              </div>

              <div class="contact-detail-item">
                <i class="bi bi-geo-alt"></i>
                <div class="detail-text">
                  <label>Address:</label>
                  <span>345 Park Avenue, San Jose, CA 95110</span>
                </div>
              </div>

              <div class="contact-detail-item">
                <i class="bi bi-telephone"></i>
                <div class="detail-text">
                  <label>Call:</label>
                  <a href="tel:1-800-7878-09">1-800-7878-09</a>
                </div>
              </div>

              <div class="contact-detail-item">
                <i class="bi bi-envelope"></i>
                <div class="detail-text">
                  <label>Mail:</label>
                  <a href="mailto:egovt@example.com">egovt@example.com</a>
                </div>
              </div>

              <div class="contact-hours">
                <h4>Opening Hours</h4>
                <p>Open Daily 10am–5pm Sunday Until 8pm.</p>
              </div>

              <div class="contact-socials">
                <a href="#" class="social-icon twitter"
                  ><i class="bi bi-twitter-x"></i
                ></a>
                <a href="#" class="social-icon facebook"
                  ><i class="bi bi-facebook"></i
                ></a>
                <a href="#" class="social-icon youtube"
                  ><i class="bi bi-youtube"></i
                ></a>
                <a href="#" class="social-icon linkedin"
                  ><i class="bi bi-linkedin"></i
                ></a>
              </div>
            </div>
          </div>

          <!-- Contact Form -->
          <div class="col-lg-7">
            <div class="contact-form-box">
              <h3>Leave your message</h3>
              <form id="contactForm" class="contact-form">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <input
                      type="text"
                      id="name"
                      class="form-control"
                      placeholder="Name"
                      pattern="[A-Za-z\s]+"
                      oninput="
                        this.value = this.value.replace(/[^A-Za-z\s]/g, '')
                      "
                      required
                    />
                  </div>
                  <div class="col-md-6 mb-3">
                    <input
                      type="email"
                      id="email"
                      class="form-control"
                      placeholder="Email"
                      required
                    />
                  </div>
                  <div class="col-12 mb-3">
                    <input
                      type="text"
                      id="subject"
                      class="form-control"
                      placeholder="Subject"
                      required
                    />
                  </div>
                  <div class="col-12 mb-4">
                    <textarea
                      id="message"
                      class="form-control"
                      rows="6"
                      placeholder="Write your message..."
                      required
                    ></textarea>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="contact-submit-btn">
                      Send Message
                    </button>
                    <div id="formMsg"></div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- GOOGLE MAP -->
    <section class="contact-map">
      <iframe
        src="https://maps.google.com/maps?q=London%20Eye%2C%20London%2C%20United%20Kingdom&t=m&z=17&output=embed&iwloc=near"
        width="100%"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
      ></iframe>
    </section>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/components.js"></script>
    <script src="script.js"></script>
  </body>
</html>
