<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Town of EGovt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-body">
    <section class="auth-section">
      <div class="auth-card">
        <img src="assets/images/logoStackly.webp" alt="Stackly Logo" class="auth-logo" />
        <h2>Account Login</h2>
        <form class="auth-form" id="loginForm">
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" required>
              <option value="" selected disabled>Select your role</option>
              <option value="citizen">Citizen</option>
              <option value="staff">Municipal Staff</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Mail ID</label>
            <input type="email" class="form-control" placeholder="Enter your email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter password" required />
          </div>
          <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label text-secondary small" for="rememberMe">
                Remember me
              </label>
            </div>
            <a href="#" class="small text-decoration-none">Forgot Password?</a>
          </div>
          <button type="submit" class="auth-btn">Sign In</button>
        </form>
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register Now</a>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/components.js"></script>
    <script src="script.js"></script>
    <script>
      // Redirect to home page on successful "login"
      document.getElementById('loginForm').addEventListener('submit', function(e) {
          e.preventDefault();
          // You can add validation logic here
          alert('Login successful! Redirecting to home page...');
          window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
